<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quest System</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #03020a;
    --surface: #0a0818;
    --panel: #0d0c1e;
    --border: #1e1a3a;
    --blue: #4fc3f7;
    --blue-dim: #1a4a6e;
    --purple: #9b59ff;
    --purple-dim: #2d1a5e;
    --red: #ff4444;
    --red-dim: #5e1a1a;
    --green: #00e676;
    --gold: #ffd700;
    --text: #c9d1ff;
    --text-dim: #5a5f8a;
    --glow-blue: 0 0 20px rgba(79,195,247,0.4);
    --glow-purple: 0 0 20px rgba(155,89,255,0.4);
    --glow-red: 0 0 20px rgba(255,68,68,0.4);
    --glow-green: 0 0 20px rgba(0,230,118,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(79,195,247,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(155,89,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 30px 0 24px;
    position: relative;
  }

  .rank-badge {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
    padding: 4px 16px;
    margin-bottom: 12px;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #ffffff 0%, var(--blue) 50%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(79,195,247,0.3));
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .date-display {
    font-size: 13px;
    color: var(--blue);
    margin-top: 10px;
    letter-spacing: 1px;
    opacity: 0.8;
  }

  /* XP BAR */
  .xp-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .xp-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
  }

  .xp-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .xp-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .xp-value {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--blue);
  }

  .xp-track {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(79,195,247,0.6);
    position: relative;
  }

  .xp-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    animation: shimmer 2s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  /* SECTION */
  .section {
    margin-bottom: 28px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .section-icon.do { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); }
  .section-icon.avoid { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    font-weight: 700;
  }

  .section-title.do { color: var(--green); text-shadow: 0 0 10px rgba(0,230,118,0.4); }
  .section-title.avoid { color: var(--red); text-shadow: 0 0 10px rgba(255,68,68,0.4); }

  .section-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* HABIT CARD */
  .habit-list { display: flex; flex-direction: column; gap: 8px; }

  .habit-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .habit-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 2px 0 0 2px;
    transition: opacity 0.2s;
  }

  .habit-card.do::before { background: var(--green); }
  .habit-card.avoid::before { background: var(--red); }

  .habit-card:hover { border-color: rgba(255,255,255,0.1); transform: translateX(2px); }

  .habit-card.checked.do {
    background: rgba(0,230,118,0.06);
    border-color: rgba(0,230,118,0.25);
    box-shadow: var(--glow-green);
  }

  .habit-card.checked.avoid {
    background: rgba(255,68,68,0.06);
    border-color: rgba(255,68,68,0.25);
    box-shadow: var(--glow-red);
  }

  .check-box {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    font-size: 12px;
    font-weight: bold;
  }

  .habit-card.do .check-box { border-color: rgba(0,230,118,0.4); color: var(--green); }
  .habit-card.avoid .check-box { border-color: rgba(255,68,68,0.4); color: var(--red); }
  .habit-card.checked .check-box { background: currentColor; }
  .habit-card.checked.do .check-box { background: var(--green); color: #000; }
  .habit-card.checked.avoid .check-box { background: var(--red); color: #fff; }

  .habit-info { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 15px;
    font-weight: 600;
    color: #e0e8ff;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }

  .habit-card.checked .habit-name { opacity: 0.6; }

  .habit-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .habit-xp {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .habit-card.do .habit-xp { color: var(--green); }
  .habit-card.avoid .habit-xp { color: var(--red); }

  .habit-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .habit-card:hover .habit-actions { opacity: 1; }

  .btn-icon {
    width: 26px;
    height: 26px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }

  .btn-icon:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-icon.del:hover { background: rgba(255,68,68,0.15); color: var(--red); border-color: var(--red); }

  /* ADD HABIT */
  .add-form {
    display: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    margin-top: 8px;
    gap: 10px;
    flex-direction: column;
  }

  .add-form.open { display: flex; }

  .form-row {
    display: flex;
    gap: 10px;
  }

  .form-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: var(--blue); }
  .form-input::placeholder { color: var(--text-dim); }

  .form-input.sm { flex: 0 0 80px; }

  .btn-add {
    padding: 8px 16px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .btn-add.do { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .btn-add.do:hover { background: rgba(0,230,118,0.25); box-shadow: var(--glow-green); }
  .btn-add.avoid { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
  .btn-add.avoid:hover { background: rgba(255,68,68,0.25); box-shadow: var(--glow-red); }
  .btn-add.cancel { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }

  .add-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 4px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.2s;
    margin-top: 8px;
    width: 100%;
    text-align: left;
  }

  .add-trigger:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* EDIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
  }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    margin-bottom: 18px;
    color: var(--purple);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  /* STREAK / COMPLETE */
  .complete-banner {
    display: none;
    background: linear-gradient(135deg, rgba(155,89,255,0.15), rgba(79,195,247,0.15));
    border: 1px solid rgba(155,89,255,0.4);
    border-radius: 4px;
    padding: 16px 20px;
    text-align: center;
    margin-bottom: 20px;
    animation: fadeIn 0.5s ease;
  }

  .complete-banner.show { display: block; }

  .complete-banner .title-text {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 15px rgba(255,215,0,0.6);
  }

  .complete-banner .sub-text {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* NOTIFICATION */
  .notif {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    font-size: 13px;
    letter-spacing: 1px;
    z-index: 200;
    transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-width: 260px;
  }

  .notif.show { transform: translateX(0); }
  .notif.green { border-color: rgba(0,230,118,0.4); color: var(--green); }
  .notif.red { border-color: rgba(255,68,68,0.4); color: var(--red); }
  .notif.blue { border-color: rgba(79,195,247,0.4); color: var(--blue); }

  /* RESET */
  .reset-btn {
    display: block;
    margin: 0 auto;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    transition: all 0.2s;
    margin-top: 24px;
  }

  .reset-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* Divider line */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 24px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="rank-badge">HUNTER SYSTEM — DAILY QUEST LOG</div>
    <h1 class="title">ARISE</h1>
    <p class="subtitle">Complete your daily quests. Rise through the ranks.</p>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <!-- XP BAR -->
  <div class="xp-container">
    <div class="xp-header">
      <span class="xp-label">Daily Completion</span>
      <span class="xp-value" id="xpValue">0 / 0 XP</span>
    </div>
    <div class="xp-track">
      <div class="xp-fill" id="xpFill" style="width: 0%"></div>
    </div>
  </div>

  <!-- COMPLETE BANNER -->
  <div class="complete-banner" id="completeBanner">
    <div class="title-text">⚡ DAILY QUEST COMPLETE ⚡</div>
    <div class="sub-text">All habits cleared. You are becoming unstoppable.</div>
  </div>

  <!-- DO SECTION -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon do">✦</div>
      <span class="section-title do">POWER QUESTS</span>
      <span class="section-count" id="doCount"></span>
    </div>
    <div class="habit-list" id="doList"></div>
    <button class="add-trigger" onclick="toggleForm('do')">＋ &nbsp;ADD QUEST</button>
    <div class="add-form" id="addFormDo">
      <div class="form-row">
        <input class="form-input" id="doName" placeholder="Quest name..." maxlength="50">
        <input class="form-input sm" id="doXp" placeholder="XP" type="number" min="1" max="999" value="10">
      </div>
      <input class="form-input" id="doDesc" placeholder="Brief description (optional)..." maxlength="80">
      <div class="form-row">
        <button class="btn-add do" onclick="addHabit('do')">CONFIRM</button>
        <button class="btn-add cancel" onclick="toggleForm('do')">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- AVOID SECTION -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon avoid">✗</div>
      <span class="section-title avoid">FORBIDDEN ACTIONS</span>
      <span class="section-count" id="avoidCount"></span>
    </div>
    <div class="habit-list" id="avoidList"></div>
    <button class="add-trigger" onclick="toggleForm('avoid')">＋ &nbsp;ADD FORBIDDEN ACTION</button>
    <div class="add-form" id="addFormAvoid">
      <div class="form-row">
        <input class="form-input" id="avoidName" placeholder="Forbidden action..." maxlength="50">
        <input class="form-input sm" id="avoidXp" placeholder="XP" type="number" min="1" max="999" value="10">
      </div>
      <input class="form-input" id="avoidDesc" placeholder="Brief description (optional)..." maxlength="80">
      <div class="form-row">
        <button class="btn-add avoid" onclick="addHabit('avoid')">CONFIRM</button>
        <button class="btn-add cancel" onclick="toggleForm('avoid')">CANCEL</button>
      </div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetDay()">↺ &nbsp;RESET DAY</button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✦ EDIT QUEST</div>
    <input class="form-input" id="editName" placeholder="Quest name..." maxlength="50" style="margin-bottom:10px;width:100%">
    <input class="form-input" id="editDesc" placeholder="Description (optional)..." maxlength="80" style="margin-bottom:10px;width:100%">
    <input class="form-input" id="editXp" placeholder="XP" type="number" min="1" max="999" style="width:100%">
    <div class="modal-actions">
      <button class="btn-add do" onclick="saveEdit()" style="flex:1">SAVE</button>
      <button class="btn-add cancel" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<script>
const DEFAULT_HABITS = {
  do: [
    { id: 'do1', name: 'Morning routine complete', desc: 'Wake up, hydrate, no phone first 30 min', xp: 15 },
    { id: 'do2', name: 'Pre-market analysis done', desc: 'Chart review before markets open', xp: 20 },
    { id: 'do3', name: 'Follow trade plan strictly', desc: 'Only setups that match your system', xp: 25 },
    { id: 'do4', name: 'Physical training session', desc: 'At least 30 min workout or calisthenics', xp: 15 },
    { id: 'do5', name: 'Sleep by target time', desc: 'In bed before your cutoff — no exceptions', xp: 20 },
    { id: 'do6', name: 'Journal trades + review', desc: 'End-of-day reflection on what worked', xp: 15 },
  ],
  avoid: [
    { id: 'av1', name: 'No revenge trading', desc: 'Lose a trade? Step back. Never chase', xp: 25 },
    { id: 'av2', name: 'No doom scrolling at night', desc: 'Phone away 1hr before bed', xp: 20 },
    { id: 'av3', name: 'No skipping meals / junk food', desc: 'Brain fuel matters for decisions', xp: 15 },
    { id: 'av4', name: 'No overtrading past limit', desc: 'Set max trades per day. Honor it.', xp: 25 },
    { id: 'av5', name: 'No negative self-talk spiral', desc: 'Catch it. Reset. Keep moving.', xp: 15 },
  ]
};

let state = { do: [], avoid: [], checked: {}, editingId: null, editingType: null };

function loadState() {
  const saved = localStorage.getItem('sl_habits_v2');
  const todayKey = new Date().toDateString();
  const savedDate = localStorage.getItem('sl_date');

  if (saved) {
    const parsed = JSON.parse(saved);
    state.do = parsed.do || [];
    state.avoid = parsed.avoid || [];
    state.checked = (savedDate === todayKey) ? (parsed.checked || {}) : {};
  } else {
    state.do = DEFAULT_HABITS.do.map(h => ({ ...h }));
    state.avoid = DEFAULT_HABITS.avoid.map(h => ({ ...h }));
    state.checked = {};
  }

  localStorage.setItem('sl_date', todayKey);
}

function saveState() {
  localStorage.setItem('sl_habits_v2', JSON.stringify({
    do: state.do,
    avoid: state.avoid,
    checked: state.checked
  }));
  localStorage.setItem('sl_date', new Date().toDateString());
}

function render() {
  renderList('do');
  renderList('avoid');
  updateXP();
}

function renderList(type) {
  const list = document.getElementById(type === 'do' ? 'doList' : 'avoidList');
  const count = document.getElementById(type === 'do' ? 'doCount' : 'avoidCount');
  const habits = state[type];
  const checked = habits.filter(h => state.checked[h.id]).length;
  count.textContent = `${checked} / ${habits.length}`;

  list.innerHTML = habits.map(h => {
    const isChecked = !!state.checked[h.id];
    return `
    <div class="habit-card ${type} ${isChecked ? 'checked' : ''}" onclick="toggleCheck('${h.id}', event)">
      <div class="check-box">${isChecked ? (type === 'do' ? '✓' : '✗') : ''}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        ${h.desc ? `<div class="habit-desc">${h.desc}</div>` : ''}
      </div>
      <div class="habit-xp">+${h.xp} XP</div>
      <div class="habit-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="openEdit('${h.id}','${type}')">✎</button>
        <button class="btn-icon del" onclick="deleteHabit('${h.id}','${type}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function updateXP() {
  const all = [...state.do, ...state.avoid];
  const totalXP = all.reduce((s, h) => s + (h.xp || 10), 0);
  const earnedXP = all.filter(h => state.checked[h.id]).reduce((s, h) => s + (h.xp || 10), 0);
  const pct = totalXP > 0 ? (earnedXP / totalXP) * 100 : 0;

  document.getElementById('xpValue').textContent = `${earnedXP} / ${totalXP} XP`;
  document.getElementById('xpFill').style.width = pct + '%';

  const banner = document.getElementById('completeBanner');
  const allChecked = all.length > 0 && all.every(h => state.checked[h.id]);
  banner.classList.toggle('show', allChecked);
}

function toggleCheck(id, e) {
  if (e.target.closest('.habit-actions')) return;
  state.checked[id] = !state.checked[id];
  saveState();

  const habit = [...state.do, ...state.avoid].find(h => h.id === id);
  if (state.checked[id] && habit) {
    showNotif(`+${habit.xp} XP  —  ${habit.name}`, 'green');
  }
  render();
}

function addHabit(type) {
  const nameEl = document.getElementById(type === 'do' ? 'doName' : 'avoidName');
  const descEl = document.getElementById(type === 'do' ? 'doDesc' : 'avoidDesc');
  const xpEl = document.getElementById(type === 'do' ? 'doXp' : 'avoidXp');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  const habit = {
    id: type + '_' + Date.now(),
    name,
    desc: descEl.value.trim(),
    xp: parseInt(xpEl.value) || 10
  };

  state[type].push(habit);
  nameEl.value = ''; descEl.value = ''; xpEl.value = '10';
  toggleForm(type);
  saveState();
  render();
  showNotif('Quest added to log', 'blue');
}

function deleteHabit(id, type) {
  state[type] = state[type].filter(h => h.id !== id);
  delete state.checked[id];
  saveState();
  render();
  showNotif('Quest removed', 'red');
}

function openEdit(id, type) {
  const habit = state[type].find(h => h.id === id);
  if (!habit) return;
  state.editingId = id;
  state.editingType = type;
  document.getElementById('editName').value = habit.name;
  document.getElementById('editDesc').value = habit.desc || '';
  document.getElementById('editXp').value = habit.xp || 10;
  document.getElementById('editModal').classList.add('open');
}

function saveEdit() {
  const { editingId, editingType } = state;
  const habit = state[editingType].find(h => h.id === editingId);
  if (!habit) return;
  const name = document.getElementById('editName').value.trim();
  if (!name) return;
  habit.name = name;
  habit.desc = document.getElementById('editDesc').value.trim();
  habit.xp = parseInt(document.getElementById('editXp').value) || 10;
  closeModal();
  saveState();
  render();
  showNotif('Quest updated', 'blue');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  state.editingId = null; state.editingType = null;
}

function toggleForm(type) {
  const form = document.getElementById(type === 'do' ? 'addFormDo' : 'addFormAvoid');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    setTimeout(() => document.getElementById(type === 'do' ? 'doName' : 'avoidName').focus(), 50);
  }
}

function resetDay() {
  if (!confirm('Reset all check-ins for today?')) return;
  state.checked = {};
  saveState();
  render();
  showNotif('Day reset. Rise again.', 'blue');
}

let notifTimer;
function showNotif(msg, type) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = `notif ${type} show`;
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function setDate() {
  const now = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', opts).toUpperCase();
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter key in add forms
['doName','doDesc','doXp'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') addHabit('do'); });
});
['avoidName','avoidDesc','avoidXp'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') addHabit('avoid'); });
});
document.getElementById('editName')?.addEventListener('keydown', e => { if (e.key === 'Enter') saveEdit(); });

loadState();
setDate();
render();
</script>
</body>
</html>
